theme = "fleet_dark"

[editor]
shell = ["fish", "-c"]

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.file-picker]
hidden = false

[editor.soft-wrap]
enable = true

[keys.normal]
w = "move_next_sub_word_start"
e = "move_next_sub_word_end"
b = "move_prev_sub_word_start"
x = "select_line_below"
X = "select_line_above"
esc = ["collapse_selection", "keep_primary_selection"]
C-S-r = [":reload-all", ":lsp-restart"]

[keys.select]
w = "extend_next_sub_word_start"
e = "extend_next_sub_word_end"
b = "extend_prev_sub_word_start"
